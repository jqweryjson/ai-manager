version: '3.8'

services:
  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    env_file:
      - .env
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    env_file:
      - .env
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - etcd_data:/etcd
    networks:
      - milvus

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio_data:/minio_data
    networks:
      - milvus

  postgres:
    image: postgres:15-alpine
    container_name: ai-manager-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8005:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - milvus

  shadowsocks-proxy:
    image: shadowsocks/shadowsocks-libev:latest
    container_name: shadowsocks-proxy
    env_file:
      - .env
    ports:
      - "1080:1080"
    command: ss-local -s 188.214.37.76 -p 8443 -k "EkdhE1PYezUdzNcy3fVHZW" -m chacha20-ietf-poly1305 -b 0.0.0.0 -l 1080 -u
    restart: unless-stopped
    networks:
      - milvus

  telegram-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-listener
    command: node dist/workers/telegram-listener.js
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/ai_manager
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - milvus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  milvus_data:
  etcd_data:
  minio_data:
  postgres_data:

networks:
  milvus:
    driver: bridge