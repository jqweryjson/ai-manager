version: "3.9"
services:
  # === PostgreSQL (основная БД приложения) ===
  postgres:
    image: postgres:15-alpine
    container_name: ai-manager-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    #ports:
      # Оставь только если нужен прямой доступ с хоста (например, для отладки)
      #- "8005:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - milvus


  # === Redis (кэш / сессии) ===
  redis:
    image: redis:7-alpine
    container_name: ai-manager-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    # Внешний порт обычно не нужен, всё общение по внутренней сети Docker
    # ports:
    #   - "6380:6379"
    networks:
      - milvus

  # === Milvus (векторное хранилище) ===
  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    env_file:
      - .env
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    #ports:
     # - "19530:19530"
    depends_on:
      - etcd
      - minio
    networks:
      - milvus

  # Веб‑интерфейс к Milvus (Attu) — опционально, удобно для отладки
  #attu:
   # image: zilliz/attu:latest
    #container_name: attu
    #environment:
     # MILVUS_URL: milvus-standalone:19530
    #ports:
     # - "6001:3000"
    #depends_on:
      #- milvus-standalone
    #networks:
     # - milvus

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    env_file:
      - .env
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - etcd_data:/etcd
    networks:
      - milvus

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    env_file:
      - .env
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    #ports:
      #- "9000:9000"
      #- "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio_data:/minio_data
    networks:
      - milvus

  # === Shadowsocks proxy (для Groq, если нужен обход блокировок) ===
  shadowsocks-proxy:
    image: shadowsocks/shadowsocks-libev:latest
    container_name: shadowsocks-proxy
    restart: unless-stopped
    env_file:
      - .env
    # команду и ключи прокси обязательно проверь и при необходимости поменяй
    command: >
      ss-local
      -s 45.151.72.236
      -p 443
      -k "1OeSSwOd3zFddpeiastQLH"
      -m chacha20-ietf-poly1305
      -b 0.0.0.0
      -l 1080
      -u
    #ports:
      #- "1080:1080"
    networks:
      - milvus

  # === RabbitMQ (очереди для Telegram‑воркеров) ===
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-manager-rabbitmq
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    #ports:
      #- "5672:5672"
      #- "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - milvus

  # === Embeddings worker (Python + bge-m3) ===
  embeddings-worker:
    image: python:3.11-slim
    container_name: ai-manager-embeddings
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./src/workers:/app
    environment:
      PORT: "5000"
      MODEL_NAME: "BAAI/bge-m3"
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python embeddings.py
      "
    # По сети наружу обычно не нужен, используется только из backend
    # ports:
    #   - "9040:5000"
    networks:
      - milvus

  # === Backend (Fastify API) ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-manager-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_PORT: "4001"
      # Явно указываем все зависимости
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT:  ${REDIS_PORT}
      MILVUS_HOST: milvus-standalone:19530
      EMBEDDINGS_WORKER_URL: http://embeddings-worker:5000
      # Если используешь прокси для Groq:
      GROQ_SOCKS_PROXY: socks5://shadowsocks-proxy:1080
    depends_on:
      postgres:
        condition: service_healthy
      milvus-standalone:
        condition: service_started
      redis:
        condition: service_started
      embeddings-worker:
        condition: service_started
    ports:
      - "4001:4001"
    networks:
      - milvus


  # === Telegram listener/sender/LLM worker ===
  telegram-listener:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-listener
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      BACKEND_URL: http://backend:4001/api
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123}@rabbitmq:5672
      EMBEDDINGS_WORKER_URL: http://embeddings-worker:5000
      MILVUS_HOST: milvus-standalone:19530
      GROQ_SOCKS_PROXY: socks5://shadowsocks-proxy:1080
      TELEGRAM_SERVICE_PORT: "4002"
    command: >
      sh -c "
        node dist/workers/telegram-listener.js &
        node dist/workers/telegram-sender.js &
        node dist/workers/telegram-llm-worker.js
      "
  # Порт наружу нужен только если хочешь ходить в HTTP‑API Telegram‑сервиса
    #ports:
      #- "4002:4002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - milvus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  milvus_data:
  etcd_data:
  minio_data:
  postgres_data:
  rabbitmq_data:

networks:
  milvus:
    driver: bridge